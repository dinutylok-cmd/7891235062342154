name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # можно запускать вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-rat-apk
          path: build/apk/*.apk
